name: Update README media

# On-demand regeneration of the committed README images (the automaton diagram
# and the gource history GIF). Run it from the Actions tab after notable history
# changes — not on every push, since the GIF is a binary that would otherwise
# churn the git history. Uncomment the schedule to refresh it periodically.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 3 1 * *'   # 03:00 on the 1st of each month

permissions:
  contents: write             # this job commits the regenerated media back

jobs:
  media:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # gource visualizes the full commit history

      - name: Install rendering tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gource ffmpeg xvfb gifsicle graphviz

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install the package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[graphs]"

      - name: Regenerate the media
        run: |
          python scripts/gen_readme_media.py
          bash scripts/gen_gource_gif.sh     # uses xvfb automatically (no $DISPLAY)

      - name: Commit if the media changed
        run: |
          if [ -n "$(git status --porcelain docs/media)" ]; then
            git config user.name  'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add docs/media
            git commit -m 'Regenerate README media (automaton + gource history)'
            git push
          else
            echo 'no media changes'
          fi
