name: Build and Deploy Docs

on:
  pull_request:
  push:
    branches:
      - 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Only one deployment at a time; a second push supersedes the first.
    concurrency: docs-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install the package and the documentation toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[graphs,docs]"

      - name: Generate the API stubs from the docstrings
        run: sphinx-apidoc -f -o docs/source/api autstr

      - name: Build the HTML
        run: sphinx-build -b html -W --keep-going docs/source docs/build/html

      - name: Deploy to GitHub Pages
        # A pull request may not write to the repository, so only main deploys.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/build/html
