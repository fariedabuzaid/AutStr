name: Build and Deploy Docs

on:
  pull_request:
  push:
    branches:
      - 'main'

# Least privilege by default: everything gets read-only access. The deploy job
# grants itself the pages/id-token scopes it needs to publish through GitHub's
# native Pages deployment (Settings -> Pages -> Source: GitHub Actions).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Only one build at a time per ref; a second push supersedes the first.
    concurrency: docs-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install graphviz (the notebooks render automata with dot)
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install the package and the documentation toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[graphs,docs]"

      - name: Generate the API stubs from the docstrings
        run: sphinx-apidoc -f -o docs/source/api autstr

      - name: Build the HTML (executes every notebook)
        run: sphinx-build -b html -W --keep-going docs/source docs/build/html

      - name: Upload the built HTML as a Pages artifact
        # A pull request only builds (to catch breakage); main also deploys.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Only this job publishes, so only this job needs the Pages/OIDC scopes.
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    # One deployment at a time; a newer run supersedes an in-flight one.
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
