name: Publish to PyPI

# Cutting a GitHub Release publishes that release's tag to PyPI.
#
# Authentication is by OIDC ("trusted publishing"): PyPI verifies that the
# request really comes from this workflow in this repository, so no API token
# is stored anywhere. Register the publisher once, at
#   https://pypi.org/manage/project/autstr/settings/publishing/
# with owner `fariedabuzaid`, repository `AutStr`, workflow `publish.yaml`,
# and environment `pypi`.
#
# Run it by hand against TestPyPI first if you want a dry run.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: Where to upload
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]

jobs:
  build:
    name: Build and check the distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install the build toolchain
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build the sdist and the wheel
        run: python -m build

      # A release whose tag disagrees with the packaged version would publish
      # something nobody can reproduce from the tag.
      - name: Check the version against the tag
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          dist=$(ls dist/*.tar.gz | sed -E 's|.*/autstr-(.*)\.tar\.gz|\1|')
          echo "tag=$tag  packaged=$dist"
          test "$tag" = "$dist"

      - name: Check the metadata
        run: twine check dist/*

      - name: Import the built wheel in a clean environment
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/*.whl
          /tmp/smoke/bin/python -c "
          import autstr
          from autstr.buildin.presentations import BuechiArithmeticZ
          assert BuechiArithmeticZ().check('exists x.(A(x,x,x))')
          print('smoke test passed for', autstr.__version__)
          "

      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    # The environment is what the trusted publisher on PyPI is bound to; it is
    # also where a required reviewer can be configured.
    environment:
      name: ${{ (github.event_name == 'release' || inputs.repository == 'pypi') && 'pypi' || 'testpypi' }}
      url: ${{ (github.event_name == 'release' || inputs.repository == 'pypi') && 'https://pypi.org/p/autstr' || 'https://test.pypi.org/p/autstr' }}
    permissions:
      id-token: write            # OIDC: this is what replaces the API token
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: github.event_name == 'release' || inputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
